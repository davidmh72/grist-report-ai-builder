<!DOCTYPE html>
<!--
  ============================================================
  REPORT AI BUILDER (report_ai_builder.html)
  Grist Report Widget — AI-powered conversational report builder
  Requires: Cloudflare Worker backend for AI generation
  ============================================================
-->
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Grist AI Report Builder</title>
    <script src="https://docs.getgrist.com/grist-plugin-api.js"></script>
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif; height: 100vh; display: flex; flex-direction: column; background: #f8f9fa; color: #333; }

        /* Header */
        .header { padding: 12px 16px; border-bottom: 1px solid #eee; background: #fff; display: flex; align-items: center; gap: 12px; }
        .header h1 { font-size: 15px; font-weight: 700; color: #264653; }
        .header .badge { font-size: 10px; background: #16b378; color: #fff; padding: 2px 8px; border-radius: 10px; font-weight: 600; }
        .header .status { margin-left: auto; font-size: 11px; color: #999; }

        /* Chat area */
        .chat { flex: 1; overflow-y: auto; padding: 16px; display: flex; flex-direction: column; gap: 12px; }
        .message { max-width: 85%; padding: 10px 14px; border-radius: 12px; font-size: 13px; line-height: 1.5; }
        .message-ai { background: #fff; border: 1px solid #e8e8e8; align-self: flex-start; border-bottom-left-radius: 4px; }
        .message-user { background: #16b378; color: #fff; align-self: flex-end; border-bottom-right-radius: 4px; }
        .message-system { background: #f0f0f0; color: #666; align-self: center; font-size: 11px; padding: 6px 12px; border-radius: 8px; }
        .message-ai .typing { display: inline-block; }
        .message-ai .typing::after { content: "▋"; animation: blink 0.8s infinite; }
        @keyframes blink { 0%, 100% { opacity: 1; } 50% { opacity: 0; } }

        /* Template preview */
        .template-preview { background: #fff; border: 1px solid #d0ebe0; border-radius: 8px; margin-top: 8px; overflow: hidden; }
        .template-preview-header { background: #f0faf6; padding: 8px 12px; font-size: 11px; font-weight: 600; color: #16b378; display: flex; justify-content: space-between; align-items: center; }
        .template-preview-body { padding: 12px; max-height: 300px; overflow-y: auto; font-size: 12px; }
        .template-actions { display: flex; gap: 6px; }
        .template-actions button { padding: 4px 10px; border: 1px solid #d0ebe0; border-radius: 6px; background: #fff; font-size: 10px; font-weight: 600; cursor: pointer; }
        .template-actions button:hover { background: #f0faf6; }
        .template-actions .btn-save { background: #16b378; color: #fff; border-color: #16b378; }
        .template-actions .btn-save:hover { background: #12956a; }

        /* Input area */
        .input-area { padding: 12px 16px; border-top: 1px solid #eee; background: #fff; display: flex; gap: 8px; }
        .input-area textarea { flex: 1; padding: 10px 12px; border: 1px solid #ddd; border-radius: 8px; font-size: 13px; font-family: inherit; resize: none; min-height: 42px; max-height: 120px; }
        .input-area textarea:focus { outline: none; border-color: #16b378; }
        .input-area button { padding: 10px 16px; background: #16b378; color: #fff; border: none; border-radius: 8px; font-size: 12px; font-weight: 600; cursor: pointer; white-space: nowrap; }
        .input-area button:hover { background: #12956a; }
        .input-area button:disabled { background: #ccc; cursor: not-allowed; }

        /* Settings panel */
        .settings { padding: 12px 16px; border-top: 1px solid #eee; background: #fafafa; display: none; }
        .settings.visible { display: block; }
        .settings-row { display: flex; gap: 8px; align-items: center; margin-bottom: 8px; }
        .settings-row label { font-size: 11px; font-weight: 600; color: #555; min-width: 80px; }
        .settings-row select, .settings-row input { padding: 6px 10px; border: 1px solid #ddd; border-radius: 6px; font-size: 12px; }
        .settings-row select { min-width: 120px; }
        .settings-toggle { font-size: 11px; color: #16b378; cursor: pointer; padding: 4px 0; text-align: center; border-top: 1px solid #eee; }
        .settings-toggle:hover { color: #12956a; }

        /* Error state */
        .error-banner { background: #fef0f0; color: #e53935; padding: 8px 12px; font-size: 11px; text-align: center; }
    </style>
</head>
<body>
<div class="header">
    <h1>AI Report Builder</h1>
    <span class="badge">Beta</span>
    <span class="status" id="connection-status">Connecting...</span>
</div>

<div class="chat" id="chat"></div>

<div class="settings-toggle" onclick="toggleSettings()">⚙️ Settings</div>
<div class="settings" id="settings">
    <div class="settings-row">
        <label>Link Table</label>
        <select id="cfg-link-table"></select>
    </div>
    <div class="settings-row">
        <label>Filter Mode</label>
        <select id="cfg-mode">
            <option value="all">All</option>
            <option value="record">Record</option>
            <option value="filtered">Filtered</option>
        </select>
    </div>
    <div class="settings-row">
        <label>Output</label>
        <select id="cfg-output">
            <option value="screen">Screen</option>
            <option value="print">Print</option>
        </select>
    </div>
    <div class="settings-row">
        <label>API Endpoint</label>
        <input type="text" id="cfg-endpoint" placeholder="https://your-worker.workers.dev/generate" style="flex:1;">
    </div>
</div>

<div class="input-area">
    <textarea id="user-input" placeholder="Describe the report you want..." rows="1" onkeydown="handleKey(event)"></textarea>
    <button id="send-btn" onclick="sendMessage()">Send</button>
</div>

<script>
(async function() {
    "use strict";

    const REPORTS_TABLE = "SysReports";
    const WIDGET_NAME = "AI Report Builder";
    const WIDGET_VERSION = "0.1.0";

    const chat = document.getElementById("chat");
    const input = document.getElementById("user-input");
    const sendBtn = document.getElementById("send-btn");
    const statusEl = document.getElementById("connection-status");

    // ── State ─────────────────────────────────────────────────────────────
    let schema = {};
    let conversation = [];
    let currentTemplate = null;
    let generating = false;

    // ── Grist Plugin API ──────────────────────────────────────────────────
    grist.ready({ requiredAccess: "full", columns: [] });

    async function fetchTable(tableId) {
        const data = await grist.docApi.fetchTable(tableId);
        const columns = Object.keys(data);
        if (columns.length === 0) return [];
        const rowCount = data.id ? data.id.length : data[columns[0]].length;
        const rows = [];
        for (let i = 0; i < rowCount; i++) {
            const row = {};
            for (const col of columns) row[col] = data[col][i];
            rows.push(row);
        }
        return rows;
    }

    async function getSchema() {
        const tables = await fetchTable("_grist_Tables");
        const columns = await fetchTable("_grist_Tables_column");
        const s = {};
        tables.forEach(t => {
            if (t.tableId && !t.tableId.startsWith("_grist") && !t.tableId.startsWith("GristHidden")) {
                s[t.tableId] = { id: t.id, columns: [] };
            }
        });
        columns.forEach(c => {
            const table = tables.find(t => t.id === c.parentId);
            if (table && s[table.tableId] && c.colId && !c.colId.startsWith("gristHelper")) {
                s[table.tableId].columns.push({ name: c.colId, type: c.type, label: c.label || c.colId });
            }
        });
        return s;
    }

    function getSchemaText() {
        let text = "";
        for (const [tableName, tableInfo] of Object.entries(schema)) {
            text += "Table: " + tableName + "\nColumns: " + tableInfo.columns.map(c => c.name + " (" + c.type + ")").join(", ") + "\n\n";
        }
        return text;
    }

    // ── Chat UI ───────────────────────────────────────────────────────────
    function addMessage(role, content, isHTML) {
        const div = document.createElement("div");
        div.className = "message message-" + role;
        if (isHTML) div.innerHTML = content;
        else div.textContent = content;
        chat.appendChild(div);
        chat.scrollTop = chat.scrollHeight;
        return div;
    }

    function addTemplatePreview(html) {
        const container = document.createElement("div");
        container.className = "template-preview";
        container.innerHTML = '<div class="template-preview-header"><span>Generated Template</span><div class="template-actions"><button onclick="copyTemplate()">📋 Copy</button><button onclick="reviseTemplate()">✏️ Revise</button><button class="btn-save" onclick="saveTemplate()">💾 Save to Reports</button></div></div><div class="template-preview-body"><pre style="white-space:pre-wrap;font-size:11px;color:#555;max-height:200px;overflow-y:auto;"></pre></div>';
        container.querySelector("pre").textContent = html.slice(0, 2000) + (html.length > 2000 ? "\n..." : "");
        chat.appendChild(container);
        chat.scrollTop = chat.scrollHeight;
    }

    function showTyping() {
        const div = addMessage("ai", '<span class="typing"></span>', true);
        div.id = "typing-indicator";
        return div;
    }

    function removeTyping() {
        const el = document.getElementById("typing-indicator");
        if (el) el.remove();
    }

    // ── API Communication ─────────────────────────────────────────────────
    function getEndpoint() {
        return document.getElementById("cfg-endpoint").value.trim() || "";
    }

    async function callAI(messages) {
        const endpoint = getEndpoint();
        if (!endpoint) {
            addMessage("system", "⚠️ Set the API endpoint in Settings first.");
            return null;
        }

        const body = {
            schema: getSchemaText(),
            tables: Object.keys(schema),
            mode: document.getElementById("cfg-mode").value,
            output: document.getElementById("cfg-output").value,
            linkTable: document.getElementById("cfg-link-table").value,
            messages: messages
        };

        try {
            const res = await fetch(endpoint, {
                method: "POST",
                headers: { "Content-Type": "application/json" },
                body: JSON.stringify(body)
            });

            if (!res.ok) {
                const err = await res.text();
                throw new Error(err || "Server error " + res.status);
            }

            const data = await res.json();
            return data;
        } catch(e) {
            addMessage("system", "⚠️ Error: " + e.message);
            return null;
        }
    }

    // ── Message handling ──────────────────────────────────────────────────
    window.handleKey = (e) => {
        if (e.key === "Enter" && !e.shiftKey) {
            e.preventDefault();
            sendMessage();
        }
        // Auto-resize textarea
        setTimeout(() => {
            input.style.height = "auto";
            input.style.height = Math.min(input.scrollHeight, 120) + "px";
        }, 0);
    };

    window.sendMessage = async () => {
        const text = input.value.trim();
        if (!text || generating) return;

        addMessage("user", text);
        conversation.push({ role: "user", content: text });
        input.value = "";
        input.style.height = "auto";

        generating = true;
        sendBtn.disabled = true;
        const typing = showTyping();

        const response = await callAI(conversation);

        removeTyping();
        generating = false;
        sendBtn.disabled = false;

        if (response) {
            if (response.template) {
                // AI returned a template
                currentTemplate = response.template;
                conversation.push({ role: "assistant", content: response.message || "Here's your report template:" });
                addMessage("ai", response.message || "Here's your report template:");
                addTemplatePreview(response.template);
            } else if (response.message) {
                // AI asking questions or responding
                conversation.push({ role: "assistant", content: response.message });
                addMessage("ai", response.message);
            }
        }

        input.focus();
    };

    // ── Template actions ──────────────────────────────────────────────────
    window.copyTemplate = () => {
        if (currentTemplate) {
            navigator.clipboard.writeText(currentTemplate).then(() => {
                addMessage("system", "Template copied to clipboard.");
            });
        }
    };

    window.reviseTemplate = () => {
        input.value = "Please revise the template: ";
        input.focus();
    };

    window.saveTemplate = async () => {
        if (!currentTemplate) return;

        const name = prompt("Report name:", "AI Generated Report");
        if (!name) return;

        try {
            const fields = {
                Report_Name: name,
                Description: "Generated by AI Builder",
                Link_Table: document.getElementById("cfg-link-table").value,
                Data_Tables: document.getElementById("cfg-link-table").value,
                Filter_Mode: document.getElementById("cfg-mode").value,
                Output: document.getElementById("cfg-output").value,
                Template_HTML: currentTemplate,
                Filters: "",
                Report_Requirements: conversation.filter(m => m.role === "user").map(m => m.content).join(" | "),
                Active: true
            };

            await grist.docApi.applyUserActions([["AddRecord", REPORTS_TABLE, null, fields]]);
            addMessage("system", '✅ "' + name + '" saved to ' + REPORTS_TABLE + '.');
        } catch(e) {
            addMessage("system", "⚠️ Save failed: " + e.message);
        }
    };

    // ── Settings ──────────────────────────────────────────────────────────
    window.toggleSettings = () => {
        document.getElementById("settings").classList.toggle("visible");
    };

    // ── Initialise ────────────────────────────────────────────────────────
    console.log(WIDGET_NAME + " v" + WIDGET_VERSION + " loading...");

    async function init() {
        try {
            schema = await getSchema();
            statusEl.textContent = Object.keys(schema).length + " tables loaded";

            // Populate link table dropdown
            const linkSelect = document.getElementById("cfg-link-table");
            Object.keys(schema).forEach(t => {
                const opt = document.createElement("option");
                opt.value = t; opt.textContent = t;
                linkSelect.appendChild(opt);
            });

            // Load saved endpoint from widget options
            grist.onOptions((options) => {
                if (options && options.endpoint) {
                    document.getElementById("cfg-endpoint").value = options.endpoint;
                }
            });

            // Welcome message
            addMessage("ai", "Hi! I can help you build a report template. Describe what you'd like — a dashboard, a detail card, a print layout — and I'll ask a few questions to get it right.");

        } catch(e) {
            statusEl.textContent = "Error";
            addMessage("system", "⚠️ Could not connect to Grist: " + e.message);
        }
    }

    init();
})();
</script>
</body>
</html>

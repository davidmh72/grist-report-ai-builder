<!DOCTYPE html>
<!--
  ============================================================
  REPORT AI BUILDER (report_ai_builder.html)
  Grist Report Widget — AI-powered conversational report builder
  Split layout: Chat (left) + Report Spec (right)
  Requires: Cloudflare Worker backend for AI generation
  ============================================================
-->
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Grist AI Report Builder</title>
    <script src="https://docs.getgrist.com/grist-plugin-api.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/handlebars@4.7.8/dist/handlebars.min.js"></script>
    <script defer src="https://cdn.jsdelivr.net/npm/chart.js@4.4.7/dist/chart.umd.min.js"></script>
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif; height: 100vh; display: flex; flex-direction: column; background: #f8f9fa; color: #333; overflow: hidden; }

        /* Header */
        .header { padding: 10px 16px; border-bottom: 1px solid #eee; background: #fff; display: flex; align-items: center; gap: 12px; flex-shrink: 0; }
        .header h1 { font-size: 15px; font-weight: 700; color: #264653; }
        .header .badge { font-size: 10px; background: #16b378; color: #fff; padding: 2px 8px; border-radius: 10px; font-weight: 600; }
        .header .status { margin-left: auto; font-size: 11px; color: #999; }
        .header .settings-btn { font-size: 11px; color: #16b378; cursor: pointer; padding: 4px 8px; border: 1px solid #d0ebe0; border-radius: 6px; }
        .header .settings-btn:hover { background: #f0faf6; }

        /* Settings bar */
        .settings-bar { padding: 8px 16px; background: #fafafa; border-bottom: 1px solid #eee; display: none; flex-shrink: 0; }
        .settings-bar.visible { display: flex; flex-wrap: wrap; gap: 8px; align-items: center; }
        .settings-bar label { font-size: 10px; font-weight: 600; color: #555; }
        .settings-bar input, .settings-bar select { padding: 4px 8px; border: 1px solid #ddd; border-radius: 4px; font-size: 11px; }
        .settings-bar input[type="password"] { width: 200px; }
        .settings-bar .sep { width: 1px; height: 20px; background: #ddd; }

        /* Main split layout */
        .main { flex: 1; display: grid; grid-template-columns: 1fr 1fr; overflow: hidden; }

        /* Left: Chat */
        .chat-panel { display: flex; flex-direction: column; border-right: 1px solid #eee; background: #fff; }
        .chat { flex: 1; overflow-y: auto; padding: 12px; display: flex; flex-direction: column; gap: 8px; }
        .message { max-width: 90%; padding: 8px 12px; border-radius: 10px; font-size: 12px; line-height: 1.5; white-space: pre-wrap; }
        .message-ai { background: #f4f4f4; align-self: flex-start; border-bottom-left-radius: 3px; }
        .message-user { background: #16b378; color: #fff; align-self: flex-end; border-bottom-right-radius: 3px; }
        .message-system { background: #e8f5e9; color: #555; align-self: center; font-size: 10px; padding: 4px 10px; border-radius: 6px; }
        .typing::after { content: "▋"; animation: blink 0.8s infinite; }
        @keyframes blink { 0%,100% { opacity:1; } 50% { opacity:0; } }
        .chat-input { padding: 8px 12px; border-top: 1px solid #eee; display: flex; gap: 6px; }
        .chat-input textarea { flex: 1; padding: 8px 10px; border: 1px solid #ddd; border-radius: 6px; font-size: 12px; font-family: inherit; resize: none; min-height: 36px; max-height: 100px; }
        .chat-input textarea:focus { outline: none; border-color: #16b378; }
        .chat-input button { padding: 8px 14px; background: #16b378; color: #fff; border: none; border-radius: 6px; font-size: 11px; font-weight: 600; cursor: pointer; }
        .chat-input button:hover { background: #12956a; }
        .chat-input button:disabled { background: #ccc; cursor: not-allowed; }

        /* Right: Report spec */
        .spec-panel { display: flex; flex-direction: column; overflow-y: auto; padding: 12px 16px; }
        .form-group { margin-bottom: 10px; }
        .form-group label { display: block; font-size: 10px; font-weight: 600; color: #555; text-transform: uppercase; letter-spacing: 0.3px; margin-bottom: 4px; }
        .form-group input, .form-group select, .form-group textarea { width: 100%; padding: 7px 10px; border: 1px solid #ddd; border-radius: 6px; font-size: 12px; font-family: inherit; }
        .form-group textarea { resize: vertical; }
        .form-group .hint { font-size: 9px; color: #aaa; margin-top: 2px; }
        .form-row { display: grid; grid-template-columns: 1fr 1fr; gap: 8px; }
        .form-row-3 { display: grid; grid-template-columns: 1fr 1fr 1fr; gap: 8px; }
        .template-box { font-family: 'SF Mono', 'Fira Code', monospace; font-size: 10px; min-height: 120px; }
        .btn { padding: 7px 14px; border: 1px solid #ddd; border-radius: 6px; font-size: 11px; font-weight: 600; cursor: pointer; }
        .btn:hover { background: #f0f0f0; }
        .btn-primary { background: #16b378; color: #fff; border-color: #16b378; }
        .btn-primary:hover { background: #12956a; }
        .btn-ai { background: #264653; color: #fff; border-color: #264653; }
        .btn-ai:hover { background: #1a3540; }
        .btn-row { display: flex; gap: 6px; margin-top: 10px; flex-wrap: wrap; }
        .status-msg { padding: 6px 10px; border-radius: 6px; font-size: 11px; margin-bottom: 8px; }
        .status-success { background: #e1fede; color: #16b378; }
        .status-error { background: #fef0f0; color: #e53935; }
        .section-label { font-size: 10px; font-weight: 600; color: #16b378; text-transform: uppercase; letter-spacing: 0.5px; margin: 12px 0 6px; padding-top: 8px; border-top: 1px solid #eee; }

        /* Preview */
        .preview-frame { border: 1px solid #ddd; border-radius: 6px; padding: 12px; background: #fff; min-height: 100px; overflow: auto; margin-top: 8px; }

        /* Responsive: stack on narrow */
        @media (max-width: 700px) {
            .main { grid-template-columns: 1fr; grid-template-rows: 1fr 1fr; }
        }
    </style>
</head>
<body>
<div class="header">
    <h1>AI Report Builder</h1>
    <span class="badge">Beta</span>
    <span class="status" id="connection-status">Connecting...</span>
    <span class="settings-btn" onclick="toggleSettings()">⚙️ Settings</span>
</div>

<div class="settings-bar" id="settings-bar">
    <label>API Endpoint:</label>
    <input type="text" id="cfg-endpoint" placeholder="https://your-worker.workers.dev" style="width:260px;">
    <span class="sep"></span>
    <label>Gemini Key:</label>
    <input type="password" id="cfg-token" placeholder="Stored in this browser only">
    <span class="sep"></span>
    <button class="btn" onclick="saveSettings()" style="padding:4px 10px; font-size:10px;">💾 Save</button>
    <span class="sep"></span>
    <label><input type="checkbox" id="cfg-transparency"> Show outgoing data</label>
    <span style="margin-left:auto; font-size:9px; color:#999;">Settings saved in browser localStorage (never sent to server)</span>
</div>

<div class="main">
    <!-- LEFT: Chat -->
    <div class="chat-panel">
        <div class="chat" id="chat"></div>
        <div class="chat-input">
            <textarea id="user-input" placeholder="Describe your report idea..." rows="1" onkeydown="handleKey(event)"></textarea>
            <button id="send-btn" onclick="sendMessage()">Send</button>
        </div>
    </div>

    <!-- RIGHT: Report Spec -->
    <div class="spec-panel" id="spec-panel">
        <div id="status-area"></div>

        <div class="form-row">
            <div class="form-group">
                <label>Report Name</label>
                <input type="text" id="rpt-name" placeholder="e.g. Sales Pipeline Dashboard">
            </div>
            <div class="form-group">
                <label>Description</label>
                <input type="text" id="rpt-desc" placeholder="Brief summary">
            </div>
        </div>

        <div class="form-row-3">
            <div class="form-group">
                <label>Link Table</label>
                <select id="rpt-link"><option value="">--</option></select>
            </div>
            <div class="form-group">
                <label>Filter Mode</label>
                <select id="rpt-mode">
                    <option value="all">All</option>
                    <option value="record">Record</option>
                    <option value="filtered">Filtered</option>
                </select>
            </div>
            <div class="form-group">
                <label>Output</label>
                <select id="rpt-output">
                    <option value="screen">Screen</option>
                    <option value="print">Print</option>
                </select>
            </div>
        </div>

        <div class="form-group">
            <label>Data Tables (comma-separated)</label>
            <input type="text" id="rpt-data" placeholder="e.g. Contacts,Deals,Tasks">
        </div>

        <div class="section-label">Requirements (refined by AI)</div>
        <div class="form-group">
            <textarea id="rpt-requirements" style="min-height:80px;" placeholder="The AI will help you build this..."></textarea>
        </div>

        <div class="btn-row">
            <button class="btn btn-ai" onclick="generateTemplate()">🤖 Generate Template</button>
            <button class="btn" onclick="previewReport()">👁 Preview</button>
        </div>

        <div class="section-label">Template HTML</div>
        <div class="form-group">
            <textarea class="template-box" id="rpt-template" placeholder="AI-generated template appears here..."></textarea>
        </div>

        <div class="form-group">
            <label>Filters JSON (optional)</label>
            <textarea id="rpt-filters" style="min-height:40px; font-family:monospace; font-size:10px;" placeholder='[{"field":"Status","type":"choice","table":"Contacts"}]'></textarea>
        </div>

        <div class="btn-row">
            <button class="btn btn-primary" onclick="saveReport()">💾 Save Report</button>
        </div>

        <div id="preview-area" style="display:none;">
            <div class="section-label">Preview</div>
            <div class="preview-frame" id="preview-frame"></div>
        </div>
    </div>
</div>

<script>
(async function() {
    "use strict";

    const REPORTS_TABLE = "SysReports";
    const DEFAULT_ENDPOINT = "https://jolly-meadow-623d.david-m-hawley.workers.dev/";

    const chat = document.getElementById("chat");
    const input = document.getElementById("user-input");
    const sendBtn = document.getElementById("send-btn");
    const statusEl = document.getElementById("connection-status");

    let schema = {};
    let conversation = [];
    let generating = false;

    // ── Grist Plugin API ──────────────────────────────────────────────────
    grist.ready({ requiredAccess: "full", columns: [] });

    async function fetchTable(tableId) {
        const data = await grist.docApi.fetchTable(tableId);
        const columns = Object.keys(data);
        if (columns.length === 0) return [];
        const rowCount = data.id ? data.id.length : data[columns[0]].length;
        const rows = [];
        for (let i = 0; i < rowCount; i++) {
            const row = {};
            for (const col of columns) row[col] = data[col][i];
            rows.push(row);
        }
        return rows;
    }

    async function getSchema() {
        const tables = await fetchTable("_grist_Tables");
        const columns = await fetchTable("_grist_Tables_column");
        const s = {};
        tables.forEach(t => {
            if (t.tableId && !t.tableId.startsWith("_grist") && !t.tableId.startsWith("GristHidden")) {
                s[t.tableId] = { id: t.id, columns: [] };
            }
        });
        columns.forEach(c => {
            const table = tables.find(t => t.id === c.parentId);
            if (table && s[table.tableId] && c.colId && !c.colId.startsWith("gristHelper")) {
                s[table.tableId].columns.push({ name: c.colId, type: c.type, label: c.label || c.colId });
            }
        });
        return s;
    }

    function getSchemaText() {
        let text = "";
        for (const [tableName, tableInfo] of Object.entries(schema)) {
            text += "Table: " + tableName + "\nColumns: " + tableInfo.columns.map(c => c.name + " (" + c.type + ")").join(", ") + "\n\n";
        }
        return text;
    }

    // ── Settings ──────────────────────────────────────────────────────────
    window.toggleSettings = () => document.getElementById("settings-bar").classList.toggle("visible");

    function saveSettings() {
        const endpoint = document.getElementById("cfg-endpoint").value.trim();
        const token = document.getElementById("cfg-token").value.trim();
        if (endpoint) localStorage.setItem("rpt_ai_endpoint", endpoint);
        if (token) localStorage.setItem("rpt_ai_apikey", token);
        addMessage("system", "✅ Settings saved to browser.");
    }
    function loadSettings() {
        const endpoint = localStorage.getItem("rpt_ai_endpoint");
        const token = localStorage.getItem("rpt_ai_apikey");
        if (endpoint) document.getElementById("cfg-endpoint").value = endpoint;
        if (token) document.getElementById("cfg-token").value = token;
    }

    // ── Chat UI ───────────────────────────────────────────────────────────
    function addMessage(role, content) {
        const div = document.createElement("div");
        div.className = "message message-" + role;
        div.textContent = content;
        chat.appendChild(div);
        chat.scrollTop = chat.scrollHeight;
        return div;
    }

    function showTyping() {
        const div = document.createElement("div");
        div.className = "message message-ai";
        div.innerHTML = '<span class="typing"></span>';
        div.id = "typing-indicator";
        chat.appendChild(div);
        chat.scrollTop = chat.scrollHeight;
    }
    function removeTyping() { const el = document.getElementById("typing-indicator"); if (el) el.remove(); }

    // ── API Communication ─────────────────────────────────────────────────
    function getEndpoint() { return document.getElementById("cfg-endpoint").value.trim() || DEFAULT_ENDPOINT; }
    function getApiKey() { return (document.getElementById("cfg-token").value || "").trim().replace(/[^\x20-\x7E]/g, ""); }

    async function callAI(messages, generateMode) {
        const endpoint = getEndpoint();
        const apiKey = getApiKey();
        if (!apiKey) { addMessage("system", "⚠️ Set your Gemini API key in Settings."); return null; }

        const body = {
            schema: getSchemaText(),
            tables: Object.keys(schema),
            mode: document.getElementById("rpt-mode").value,
            output: document.getElementById("rpt-output").value,
            linkTable: document.getElementById("rpt-link").value,
            dataTables: document.getElementById("rpt-data").value,
            requirements: document.getElementById("rpt-requirements").value,
            messages: messages,
            generateTemplate: !!generateMode
        };

        if (document.getElementById("cfg-transparency").checked) {
            addMessage("system", "📤 Sending: schema (" + body.tables.length + " tables), " + body.messages.length + " messages, mode=" + body.mode);
        }

        const headers = { "Content-Type": "application/json" };
        if (apiKey) headers["X-Auth-Token"] = apiKey;

        try {
            const res = await fetch(endpoint, { method: "POST", headers, body: JSON.stringify(body) });
            if (!res.ok) { const err = await res.text(); throw new Error(err); }
            return await res.json();
        } catch(e) {
            addMessage("system", "⚠️ " + e.message);
            return null;
        }
    }

    // ── Message handling ──────────────────────────────────────────────────
    window.handleKey = (e) => {
        if (e.key === "Enter" && !e.shiftKey) { e.preventDefault(); sendMessage(); }
        setTimeout(() => { input.style.height = "auto"; input.style.height = Math.min(input.scrollHeight, 100) + "px"; }, 0);
    };

    window.sendMessage = async () => {
        const text = input.value.trim();
        if (!text || generating) return;

        addMessage("user", text);
        conversation.push({ role: "user", content: text });
        input.value = ""; input.style.height = "auto";

        generating = true; sendBtn.disabled = true;
        showTyping();

        const response = await callAI(conversation, false);
        removeTyping();
        generating = false; sendBtn.disabled = false;

        if (response) {
            if (response.message) {
                conversation.push({ role: "assistant", content: response.message });
                addMessage("ai", response.message);
            }
            // If AI suggested form field updates
            if (response.fields) {
                if (response.fields.Report_Name) document.getElementById("rpt-name").value = response.fields.Report_Name;
                if (response.fields.Description) document.getElementById("rpt-desc").value = response.fields.Description;
                if (response.fields.Link_Table) document.getElementById("rpt-link").value = response.fields.Link_Table;
                if (response.fields.Data_Tables) document.getElementById("rpt-data").value = response.fields.Data_Tables;
                if (response.fields.Filter_Mode) document.getElementById("rpt-mode").value = response.fields.Filter_Mode;
                if (response.fields.Output) document.getElementById("rpt-output").value = response.fields.Output;
                if (response.fields.Report_Requirements) document.getElementById("rpt-requirements").value = response.fields.Report_Requirements;
                if (response.fields.Filters) document.getElementById("rpt-filters").value = response.fields.Filters;
            }
            // If template was generated
            if (response.template) {
                document.getElementById("rpt-template").value = response.template;
                addMessage("system", "✅ Template generated and placed in the form.");
            }
        }
        input.focus();
    };

    // ── Generate Template ─────────────────────────────────────────────────
    window.generateTemplate = async () => {
        if (generating) return;
        const requirements = document.getElementById("rpt-requirements").value.trim();
        if (!requirements) { showStatus("Enter requirements first (use the chat to refine them).", "error"); return; }

        generating = true; sendBtn.disabled = true;
        addMessage("system", "🤖 Generating template...");
        showTyping();

        // Add a generate instruction to conversation
        const genMessages = [...conversation, { role: "user", content: "Generate the HTML template now based on the current requirements. Output the complete template." }];

        const response = await callAI(genMessages, true);
        removeTyping();
        generating = false; sendBtn.disabled = false;

        if (response) {
            if (response.template) {
                document.getElementById("rpt-template").value = response.template;
                addMessage("system", "✅ Template generated (" + response.template.length + " chars). Preview or save when ready.");
                if (response.message) addMessage("ai", response.message);
            } else if (response.message) {
                addMessage("ai", response.message);
            }
        }
    };

    // ── Preview ───────────────────────────────────────────────────────────
    window.previewReport = async () => {
        const templateHTML = document.getElementById("rpt-template").value;
        if (!templateHTML) { showStatus("No template to preview.", "error"); return; }
        try {
            const dataTables = (document.getElementById("rpt-data").value || document.getElementById("rpt-link").value).split(",").map(t => t.trim()).filter(Boolean);
            const data = {};
            await Promise.all(dataTables.map(async (table) => { data[table] = await fetchTable(table); }));
            data._meta = { reportName: "Preview", generatedAt: new Date().toLocaleString("en-GB") };

            const template = Handlebars.compile(templateHTML);
            const html = template(data);
            document.getElementById("preview-frame").innerHTML = html;
            document.getElementById("preview-area").style.display = "block";
            showStatus("Preview rendered.", "success");
        } catch(e) {
            showStatus("Preview error: " + e.message, "error");
        }
    };

    // ── Save Report ───────────────────────────────────────────────────────
    window.saveReport = async () => {
        const name = document.getElementById("rpt-name").value.trim();
        const templateHTML = document.getElementById("rpt-template").value.trim();
        if (!name) { showStatus("Report name is required.", "error"); return; }
        if (!templateHTML) { showStatus("Template HTML is required.", "error"); return; }

        try {
            const fields = {
                Report_Name: name,
                Description: document.getElementById("rpt-desc").value.trim(),
                Link_Table: document.getElementById("rpt-link").value,
                Data_Tables: document.getElementById("rpt-data").value.trim(),
                Filter_Mode: document.getElementById("rpt-mode").value,
                Output: document.getElementById("rpt-output").value,
                Template_HTML: templateHTML,
                Filters: document.getElementById("rpt-filters").value.trim(),
                Report_Requirements: document.getElementById("rpt-requirements").value.trim(),
                Active: true
            };
            await grist.docApi.applyUserActions([["AddRecord", REPORTS_TABLE, null, fields]]);
            showStatus('"' + name + '" saved.', "success");
            addMessage("system", '💾 "' + name + '" saved to ' + REPORTS_TABLE + '.');
        } catch(e) {
            showStatus("Save failed: " + e.message, "error");
        }
    };

    // ── Utilities ─────────────────────────────────────────────────────────
    function showStatus(msg, type) {
        const area = document.getElementById("status-area");
        area.innerHTML = '<div class="status-msg status-' + type + '">' + msg + '</div>';
        setTimeout(() => { area.innerHTML = ""; }, 5000);
    }

    // ── Initialise ────────────────────────────────────────────────────────
    loadSettings();

    async function init() {
        try {
            schema = await getSchema();
            statusEl.textContent = Object.keys(schema).length + " tables";

            // Populate link table dropdown
            const linkSelect = document.getElementById("rpt-link");
            Object.keys(schema).forEach(t => {
                const opt = document.createElement("option");
                opt.value = t; opt.textContent = t;
                linkSelect.appendChild(opt);
            });

            addMessage("ai", "Hi! Describe the report you'd like to build. I'll ask a few questions to refine the requirements, then generate the template for you.\n\nYou can also fill in the form fields on the right manually — I'll use whatever's there as context.");
        } catch(e) {
            statusEl.textContent = "Error";
            addMessage("system", "⚠️ Could not connect to Grist: " + e.message);
        }
    }

    init();
})();
</script>
</body>
</html>
